<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProofFrog</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/eclipse.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e1e;
      --bg2: #252526;
      --bg3: #2d2d30;
      --border: #3e3e42;
      --text: #cccccc;
      --text-dim: #858585;
      --accent: #4ec9b0;
      --accent2: #569cd6;
      --success: #4ec9b0;
      --error: #f48771;
      --warn: #ce9178;
      --tab-active: #1e1e1e;
      --tab-inactive: #2d2d30;
      --readonly-bg: #181818;
      --sidebar-width: 220px;
      --toolbar-height: 38px;
      --tab-height: 35px;
      --output-height: 220px;
    }

    html[data-theme="light"] {
      --bg: #f3f3f3;
      --bg2: #ffffff;
      --bg3: #e8e8e8;
      --border: #d0d0d0;
      --text: #333333;
      --text-dim: #777777;
      --accent: #007a7a;
      --accent2: #0066b8;
      --success: #007a7a;
      --error: #c0392b;
      --warn: #8b5e00;
      --tab-active: #f3f3f3;
      --tab-inactive: #e8e8e8;
      --readonly-bg: #f0f0f0;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; overflow: hidden; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    #toolbar {
      display: flex; align-items: center; gap: 6px;
      height: var(--toolbar-height); padding: 0 10px;
      background: var(--bg3); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #toolbar .logo { font-weight: 700; color: var(--accent); margin-right: 8px; font-size: 14px; }
    #toolbar button {
      padding: 4px 12px; border: 1px solid var(--border); border-radius: 3px;
      background: var(--bg2); color: var(--text); cursor: pointer; font-size: 12px;
      transition: background 0.15s;
    }
    #toolbar button:hover:not(:disabled) { background: var(--bg3); border-color: var(--accent2); }
    #toolbar button:disabled { opacity: 0.4; cursor: default; }
    #toolbar button.primary { border-color: var(--accent2); color: var(--accent2); }
    #toolbar button.running { opacity: 0.6; }
    #toolbar .spacer { flex: 1; }
    #toolbar .dir-label { color: var(--text-dim); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }

    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-width); background: var(--bg2);
      border-right: 1px solid var(--border); overflow-y: auto;
      flex-shrink: 0; display: flex; flex-direction: column;
    }
    #sidebar-header {
      padding: 6px 10px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #file-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
    .tree-item { display: flex; align-items: center; cursor: pointer; padding: 2px 8px; user-select: none; }
    .tree-item:hover { background: var(--bg3); }
    .tree-item.active { background: rgba(78,201,176,0.12); color: var(--accent); }
    .tree-item .icon { margin-right: 5px; font-size: 12px; flex-shrink: 0; }
    .tree-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .tree-dir > .tree-children { display: block; }
    .tree-dir.collapsed > .tree-children { display: none; }

    /* ── Editor area ── */
    #editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    #tabs {
      display: flex; align-items: stretch; background: var(--bg3);
      border-bottom: 1px solid var(--border); height: var(--tab-height);
      overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
    }
    #tabs::-webkit-scrollbar { display: none; }
    .tab {
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px; border-right: 1px solid var(--border);
      cursor: pointer; white-space: nowrap; background: var(--tab-inactive);
      color: var(--text-dim); font-size: 12px; min-width: 0; max-width: 160px;
      transition: background 0.1s;
    }
    .tab:hover { background: var(--bg); color: var(--text); }
    .tab.active { background: var(--tab-active); color: var(--text); border-bottom: 2px solid var(--accent2); }
    .tab .tab-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .tab .tab-dot { color: var(--warn); font-size: 16px; line-height: 1; flex-shrink: 0; }
    .tab .tab-close { color: var(--text-dim); flex-shrink: 0; border-radius: 3px; padding: 1px 3px; }
    .tab .tab-close:hover { background: var(--bg3); color: var(--text); }
    #tabs-empty { display: flex; align-items: center; padding: 0 12px; color: var(--text-dim); font-size: 12px; }

    #editors-container { flex: 1; position: relative; overflow: hidden; }
    .editor-wrap { position: absolute; inset: 0; display: none; }
    .editor-wrap.active { display: block; }
    /* CodeMirror 5 sizing */
    .editor-wrap .CodeMirror { height: 100%; font-size: 13px; font-family: 'Menlo','Monaco','Consolas',monospace; }
    .editor-wrap .CodeMirror-scroll { height: 100%; }

    /* ── Output pane ── */
    #output-pane {
      background: var(--bg2); border-top: 1px solid var(--border);
      display: none; flex-direction: column; flex-shrink: 0;
      height: var(--output-height); min-height: 80px;
    }
    #output-pane.visible { display: flex; }
    #output-header {
      display: flex; align-items: center; padding: 4px 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 8px;
    }
    #output-status { font-weight: 600; font-size: 12px; }
    #output-status.success { color: var(--success); }
    #output-status.error { color: var(--error); }
    #output-title { color: var(--text-dim); font-size: 11px; flex: 1; }
    #output-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; padding: 0 4px; }
    #output-close:hover { color: var(--text); }
    #output-content { flex: 1; overflow: auto; padding: 8px 12px; }
    #output-content pre {
      font-family: 'Menlo', 'Monaco', 'Consolas', monospace; font-size: 12px;
      line-height: 1.5; white-space: pre-wrap; word-break: break-all; color: var(--text);
    }

    /* ── Read-only (inline) editors ── */
    .editor-wrap.readonly .CodeMirror { background: var(--readonly-bg); }
    .editor-wrap.readonly .CodeMirror-cursor { display: none !important; }

    /* ── Split-pane (inline game + canonical) ── */
    .editor-wrap.split-view { display: flex; flex-direction: row; }
    .split-pane { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-width: 0; }
    .split-pane-header {
      padding: 3px 10px; font-size: 11px; font-weight: 600;
      background: var(--bg3); border-bottom: 1px solid var(--border);
      color: var(--text-dim); letter-spacing: 0.05em; flex-shrink: 0;
    }
    .split-pane .CodeMirror { height: 100%; font-size: 13px; font-family: 'Menlo','Monaco','Consolas',monospace; }
    .split-pane .CodeMirror-scroll { height: 100%; }
    .v-split-handle {
      width: 4px; cursor: ew-resize; background: transparent; flex-shrink: 0;
      border-left: 1px solid var(--border);
    }
    .v-split-handle:hover, .v-split-handle.dragging { background: var(--accent2); }

    /* ── Welcome screen ── */
    #welcome {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: var(--text-dim); pointer-events: none;
    }
    #welcome.hidden { display: none; }
    #welcome h2 { font-size: 22px; color: var(--accent); font-weight: 300; }
    #welcome p { font-size: 13px; }

    /* ── Resize handle ── */
    #resize-handle {
      height: 4px; cursor: ns-resize; background: transparent; flex-shrink: 0;
      border-top: 1px solid var(--border);
    }
    #resize-handle:hover { background: var(--accent2); }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="logo">ProofFrog</span>
    <button id="btn-save" title="Save (Ctrl+S)" disabled>Save</button>
    <button id="btn-parse" class="primary" title="Parse current file" disabled>Parse</button>
    <button id="btn-prove" class="primary" title="Run proof" disabled style="display:none">Run Proof</button>
    <button id="btn-inline" class="primary" title="Show inlined game for current step" disabled style="display:none">Inline Game</button>
    <span class="spacer"></span>
    <span class="dir-label" id="dir-label"></span>
    <button id="btn-theme" title="Toggle light/dark mode">Dark</button>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header">Explorer</div>
      <div id="file-tree"></div>
    </div>
    <div id="editor-area">
      <div id="tabs"><span id="tabs-empty">Open a file from the explorer</span></div>
      <div id="editors-container">
        <div id="welcome">
          <h2>ProofFrog</h2>
          <p>Select a file from the explorer to start editing.</p>
        </div>
      </div>
      <div id="resize-handle"></div>
      <div id="output-pane">
        <div id="output-header">
          <span id="output-status"></span>
          <span id="output-title"></span>
          <button id="output-close" title="Close output">&#x2715;</button>
        </div>
        <div id="output-content"><pre id="output-pre"></pre></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────────────────

const tabs = new Map(); // path → { name, savedContent, cm, wrap, readonly }
let activeTab = null;
let cursorInlineStep = null; // null or { stepIndex, label }

// ── DOM refs ─────────────────────────────────────────────────────────────────

const tabsEl = document.getElementById("tabs");
const tabsEmpty = document.getElementById("tabs-empty");
const editorsContainer = document.getElementById("editors-container");
const welcome = document.getElementById("welcome");
const btnSave = document.getElementById("btn-save");
const btnParse = document.getElementById("btn-parse");
const btnProve = document.getElementById("btn-prove");
const btnInline = document.getElementById("btn-inline");
const btnTheme = document.getElementById("btn-theme");
const dirLabel = document.getElementById("dir-label");
const outputPane = document.getElementById("output-pane");
const outputStatus = document.getElementById("output-status");
const outputTitle = document.getElementById("output-title");
const outputPre = document.getElementById("output-pre");
const fileTree = document.getElementById("file-tree");

// ── Theme ─────────────────────────────────────────────────────────────────────

let darkMode = localStorage.getItem("theme") === "dark";

function getCmTheme() { return darkMode ? "dracula" : "eclipse"; }

function applyTheme(dark) {
  darkMode = dark;
  localStorage.setItem("theme", dark ? "dark" : "light");
  document.documentElement.dataset.theme = dark ? "dark" : "light";
  btnTheme.textContent = dark ? "Light" : "Dark";
  tabs.forEach(tab => {
    tab.cm.setOption("theme", getCmTheme());
    if (tab.cmRight) tab.cmRight.setOption("theme", getCmTheme());
  });
}

// ── API helpers ───────────────────────────────────────────────────────────────

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, opts);
  return res.json();
}

// ── Editor ────────────────────────────────────────────────────────────────────

function createEditor(content, onChange, path) {
  const wrap = document.createElement("div");
  wrap.className = "editor-wrap";
  editorsContainer.appendChild(wrap);

  const cm = CodeMirror(wrap, {
    value: content,
    theme: getCmTheme(),
    lineNumbers: true,
    tabSize: 2,
    indentWithTabs: false,
    lineWrapping: false,
    extraKeys: {
      "Ctrl-S": () => saveFile(activeTab),
      "Cmd-S": () => saveFile(activeTab),
      Tab: (cm) => {
        if (cm.somethingSelected()) {
          cm.indentSelection("add");
        } else {
          cm.replaceSelection("  ");
        }
      },
      "Shift-Tab": (cm) => cm.indentSelection("subtract"),
    },
  });

  cm.on("change", onChange);

  if (path && path.endsWith(".proof")) {
    cm.on("cursorActivity", () => {
      if (activeTab !== path) return;
      cursorInlineStep = getStepAtCursor(cm.getValue(), cm.getCursor().line);
      updateInlineButton();
    });
  }

  return { cm, wrap };
}

// ── Tab management ────────────────────────────────────────────────────────────

function getTabContent(path) {
  const tab = tabs.get(path);
  return tab ? tab.cm.getValue() : null;
}

function isModified(path) {
  const tab = tabs.get(path);
  if (!tab) return false;
  return tab.cm.getValue() !== tab.savedContent;
}

function updateTabEl(path) {
  const el = document.querySelector(`.tab[data-path="${CSS.escape(path)}"]`);
  if (!el) return;
  const dot = el.querySelector(".tab-dot");
  dot.style.visibility = isModified(path) ? "visible" : "hidden";
}

function activateTab(path) {
  if (activeTab === path) return;

  // Deactivate old
  if (activeTab) {
    const oldTabEl = document.querySelector(`.tab[data-path="${CSS.escape(activeTab)}"]`);
    if (oldTabEl) oldTabEl.classList.remove("active");
    const oldWrap = tabs.get(activeTab)?.wrap;
    if (oldWrap) oldWrap.classList.remove("active");
  }

  activeTab = path;
  cursorInlineStep = null;
  welcome.classList.add("hidden");

  const tabEl = document.querySelector(`.tab[data-path="${CSS.escape(path)}"]`);
  if (tabEl) tabEl.classList.add("active");

  const { wrap, cm, cmRight } = tabs.get(path);
  wrap.classList.add("active");
  cm.refresh(); // CM5 needs refresh after being made visible
  if (cmRight) cmRight.refresh();
  if (!tabs.get(path)?.readonly) cm.focus();

  updateToolbar();
  scrollTabIntoView(path);
}

function scrollTabIntoView(path) {
  const el = document.querySelector(`.tab[data-path="${CSS.escape(path)}"]`);
  if (el) el.scrollIntoView({ block: "nearest", inline: "nearest" });
}

function updateToolbar() {
  const hasTab = activeTab !== null;
  const isVirtual = hasTab && activeTab.startsWith(":inline:");
  btnSave.disabled = !hasTab || isVirtual;
  btnParse.disabled = !hasTab || isVirtual;
  const isProof = hasTab && activeTab.endsWith(".proof");
  btnProve.style.display = isProof ? "" : "none";
  btnProve.disabled = !isProof;
  updateInlineButton();
}

function updateInlineButton() {
  const isProof = activeTab && activeTab.endsWith(".proof");
  if (!isProof || !cursorInlineStep) {
    btnInline.style.display = "none";
    return;
  }
  btnInline.style.display = "";
  btnInline.disabled = false;
}

async function openFile(path, name) {
  if (tabs.has(path)) {
    activateTab(path);
    return;
  }

  const data = await apiFetch(`/api/file?path=${encodeURIComponent(path)}`);
  if (data.error) { alert(data.error); return; }
  const content = data.content;

  const { cm, wrap } = createEditor(content, () => updateTabEl(path), path);

  tabs.set(path, { name, savedContent: content, cm, wrap, readonly: false });

  // Create tab element
  const tabEl = document.createElement("div");
  tabEl.className = "tab";
  tabEl.dataset.path = path;
  tabEl.innerHTML = `<span class="tab-name" title="${path}">${name}</span><span class="tab-dot" style="visibility:hidden">&#x2022;</span><span class="tab-close" title="Close">&#x2715;</span>`;
  tabEl.addEventListener("click", e => {
    if (e.target.classList.contains("tab-close")) { closeTab(path); return; }
    activateTab(path);
  });
  tabsEmpty.style.display = "none";
  tabsEl.appendChild(tabEl);

  activateTab(path);
  highlightActiveFile(path);
}

function closeTab(path) {
  if (!path.startsWith(":inline:") && isModified(path)) {
    const name = tabs.get(path)?.name;
    if (!confirm(`'${name}' has unsaved changes. Close anyway?`)) return;
  }

  const tab = tabs.get(path);
  if (tab) {
    tab.wrap.remove();
    tabs.delete(path);
  }

  const tabEl = document.querySelector(`.tab[data-path="${CSS.escape(path)}"]`);
  if (tabEl) tabEl.remove();

  if (activeTab === path) {
    activeTab = null;
    welcome.classList.remove("hidden");
    const remaining = [...tabs.keys()];
    if (remaining.length > 0) activateTab(remaining[remaining.length - 1]);
  }

  if (tabs.size === 0) tabsEmpty.style.display = "";
  updateToolbar();
  highlightActiveFile(activeTab);
}

// ── Save ──────────────────────────────────────────────────────────────────────

async function saveFile(path) {
  if (!path) return;
  const content = getTabContent(path);
  const res = await apiFetch(`/api/file?path=${encodeURIComponent(path)}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content }),
  });
  if (res.success) {
    const tab = tabs.get(path);
    if (tab) tab.savedContent = content;
    updateTabEl(path);
  }
}

// ── Parse / Prove ─────────────────────────────────────────────────────────────

function setRunning(running) {
  btnParse.disabled = running || !activeTab;
  btnProve.disabled = running || !(activeTab && activeTab.endsWith(".proof"));
  btnSave.disabled = running || !activeTab;
  btnInline.disabled = running || !cursorInlineStep;
  if (running) {
    btnParse.classList.add("running");
    btnProve.classList.add("running");
    btnInline.classList.add("running");
  } else {
    btnParse.classList.remove("running");
    btnProve.classList.remove("running");
    btnInline.classList.remove("running");
    updateToolbar();
  }
}

async function runCommand(endpoint, title) {
  if (!activeTab) return;
  const content = getTabContent(activeTab);
  setRunning(true);
  outputPane.classList.add("visible");
  outputTitle.textContent = `Running ${title} on ${tabs.get(activeTab)?.name}…`;
  outputStatus.textContent = "";
  outputStatus.className = "";
  outputPre.textContent = "";

  try {
    const data = await apiFetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: activeTab, content }),
    });

    // Update saved state (auto-save happened server-side)
    const tab = tabs.get(activeTab);
    if (tab) { tab.savedContent = content; updateTabEl(activeTab); }

    outputTitle.textContent = title;
    if (data.success) {
      outputStatus.textContent = "✓ Success";
      outputStatus.className = "success";
    } else {
      outputStatus.textContent = "✗ Failed";
      outputStatus.className = "error";
    }
    outputPre.textContent = data.output || "(no output)";
  } catch (e) {
    outputStatus.textContent = "✗ Error";
    outputStatus.className = "error";
    outputPre.textContent = String(e);
  } finally {
    setRunning(false);
  }
}

// ── Cursor / games-section detection ─────────────────────────────────────────

function getStepAtCursor(content, cursorLine) {
  const lines = content.split("\n");

  // Find the "games:" line
  let gamesLine = -1;
  for (let i = 0; i < lines.length; i++) {
    if (/^\s*games\s*:/.test(lines[i])) { gamesLine = i; break; }
  }
  if (gamesLine === -1 || cursorLine <= gamesLine) return null;

  // Walk through the games section line-by-line, tracking:
  //   braceDepth — to skip induction { ... } blocks
  //   stepIndex  — 0-based count of all ; -terminated top-level statements
  //   currentStepStart — first line of the current in-progress statement
  let braceDepth = 0;
  let stepIndex = 0;
  let currentStepStart = gamesLine + 1;

  for (let i = gamesLine + 1; i < lines.length; i++) {
    const raw = lines[i];
    // Strip line comments
    const stripped = raw.replace(/\/\/.*$/, "");

    for (const ch of stripped) {
      if (ch === "{") braceDepth++;
      else if (ch === "}") braceDepth--;
    }

    // Only track steps at depth 0 (not inside induction blocks)
    if (braceDepth === 0 && stripped.includes(";")) {
      // This line ends a top-level step
      if (cursorLine >= currentStepStart && cursorLine <= i) {
        // Cursor is within this step's line range
        const stepText = lines
          .slice(currentStepStart, i + 1)
          .map(l => l.replace(/\/\/.*$/, "").trim())
          .join(" ")
          .replace(/\s+/g, " ")
          .trim();

        if (!stepText.includes(" against ")) return null; // assume step or other

        const label = stepText.length > 50 ? stepText.slice(0, 47) + "…" : stepText;
        return { stepIndex, label };
      }
      stepIndex++;
      currentStepStart = i + 1;
    }
  }
  return null;
}

// ── Inline tab ────────────────────────────────────────────────────────────────

async function openInlineTab(stepIndex, label) {
  if (!activeTab) return;
  const sourceTab = activeTab;
  const content = getTabContent(sourceTab);
  const virtualPath = `:inline:${stepIndex}:${sourceTab}`;

  // Close existing inline tab for this step if already open
  if (tabs.has(virtualPath)) closeTab(virtualPath);

  // Build split-view wrapper: left pane (inlined) + drag handle + right pane (canonical)
  const wrap = document.createElement("div");
  wrap.className = "editor-wrap readonly split-view";
  editorsContainer.appendChild(wrap);

  function makeSplitPane(headerText) {
    const pane = document.createElement("div");
    pane.className = "split-pane";
    const header = document.createElement("div");
    header.className = "split-pane-header";
    header.textContent = headerText;
    pane.appendChild(header);
    return pane;
  }

  const leftPane = makeSplitPane("Inlined Game");
  const handle = document.createElement("div");
  handle.className = "v-split-handle";
  const rightPane = makeSplitPane("Canonical Form");

  wrap.appendChild(leftPane);
  wrap.appendChild(handle);
  wrap.appendChild(rightPane);

  const cmOpts = { value: "Loading…", theme: getCmTheme(), lineNumbers: true, readOnly: true, lineWrapping: false };
  const cmLeft = CodeMirror(leftPane, cmOpts);
  const cmRight = CodeMirror(rightPane, { ...cmOpts });

  // Vertical drag-to-resize
  (function setupVSplit() {
    let startX, startFlex;
    handle.addEventListener("mousedown", e => {
      startX = e.clientX;
      startFlex = leftPane.getBoundingClientRect().width;
      handle.classList.add("dragging");
      function onMove(e) {
        const delta = e.clientX - startX;
        const totalW = wrap.getBoundingClientRect().width - handle.offsetWidth;
        const newLeftW = Math.max(100, Math.min(totalW - 100, startFlex + delta));
        leftPane.style.flex = `0 0 ${newLeftW}px`;
        rightPane.style.flex = "1 1 0";
        cmLeft.refresh();
        cmRight.refresh();
      }
      function onUp() {
        handle.classList.remove("dragging");
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  })();

  const tabName = `[inline] ${label}`;
  tabs.set(virtualPath, { name: tabName, savedContent: "Loading…", cm: cmLeft, cmRight, wrap, readonly: true });

  const tabEl = document.createElement("div");
  tabEl.className = "tab";
  tabEl.dataset.path = virtualPath;
  tabEl.innerHTML = `<span class="tab-name" title="${label}">${tabName}</span><span class="tab-dot" style="visibility:hidden">&#x2022;</span><span class="tab-close" title="Close">&#x2715;</span>`;
  tabEl.addEventListener("click", e => {
    if (e.target.classList.contains("tab-close")) { closeTab(virtualPath); return; }
    activateTab(virtualPath);
  });
  tabsEmpty.style.display = "none";
  tabsEl.appendChild(tabEl);

  activateTab(virtualPath);

  // Fetch both the inlined game and canonical form
  setRunning(true);
  try {
    const data = await apiFetch("/api/inline", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: sourceTab, content, step_index: stepIndex }),
    });
    const raw = data.output || "(no output)";
    const canonical = data.canonical || "(no output)";
    cmLeft.setValue(raw);
    cmRight.setValue(canonical);
    const tab = tabs.get(virtualPath);
    if (tab) tab.savedContent = raw;
  } catch (e) {
    cmLeft.setValue(`Error: ${e}`);
    cmRight.setValue("");
  } finally {
    setRunning(false);
  }
}

// ── File tree ─────────────────────────────────────────────────────────────────

function buildTree(node, depth) {
  const el = document.createElement("div");

  if (node.type === "directory") {
    el.className = "tree-dir";
    const header = document.createElement("div");
    header.className = "tree-item";
    header.style.paddingLeft = `${8 + depth * 14}px`;
    header.innerHTML = `<span class="icon">&#x25BC;</span><span class="name">${node.name}</span>`;
    header.addEventListener("click", () => {
      el.classList.toggle("collapsed");
      header.querySelector(".icon").innerHTML = el.classList.contains("collapsed") ? "&#x25B6;" : "&#x25BC;";
    });
    const children = document.createElement("div");
    children.className = "tree-children";
    (node.children || []).forEach(child => children.appendChild(buildTree(child, depth + 1)));
    el.appendChild(header);
    el.appendChild(children);
  } else {
    el.className = "tree-item";
    el.dataset.path = node.path;
    el.style.paddingLeft = `${8 + depth * 14}px`;
    el.innerHTML = `<span class="icon">&#x1F4C4;</span><span class="name">${node.name}</span>`;
    el.addEventListener("click", () => openFile(node.path, node.name));
  }
  return el;
}

function highlightActiveFile(path) {
  document.querySelectorAll(".tree-item[data-path]").forEach(el => {
    el.classList.toggle("active", el.dataset.path === path);
  });
}

async function loadFileTree() {
  const data = await apiFetch("/api/files");
  fileTree.innerHTML = "";
  dirLabel.textContent = data.name || "";
  (data.children || []).forEach(child => fileTree.appendChild(buildTree(child, 0)));
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────

document.addEventListener("keydown", e => {
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key === "s") { e.preventDefault(); saveFile(activeTab); }
});

// ── Wire up buttons ───────────────────────────────────────────────────────────

btnSave.addEventListener("click", () => saveFile(activeTab));
btnParse.addEventListener("click", () => runCommand("/api/parse", "Parse"));
btnProve.addEventListener("click", () => runCommand("/api/prove", "Run Proof"));
btnInline.addEventListener("click", () => {
  if (activeTab && cursorInlineStep) {
    openInlineTab(cursorInlineStep.stepIndex, cursorInlineStep.label);
  }
});
document.getElementById("output-close").addEventListener("click", () => outputPane.classList.remove("visible"));
btnTheme.addEventListener("click", () => applyTheme(!darkMode));

// ── Resize handle ─────────────────────────────────────────────────────────────

(function setupResize() {
  const handle = document.getElementById("resize-handle");
  let startY, startH;
  handle.addEventListener("mousedown", e => {
    startY = e.clientY;
    startH = outputPane.offsetHeight;
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", () => document.removeEventListener("mousemove", onMove), { once: true });
  });
  function onMove(e) {
    const delta = startY - e.clientY;
    const newH = Math.max(80, Math.min(600, startH + delta));
    outputPane.style.height = newH + "px";
  }
})();

// ── Init ──────────────────────────────────────────────────────────────────────

applyTheme(darkMode);
updateToolbar();
loadFileTree();
</script>
</body>
</html>
